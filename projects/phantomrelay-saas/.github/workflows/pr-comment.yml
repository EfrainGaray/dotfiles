# PhantomRelay SaaS — PR Comment with build info
# Posts image sizes, test results, and coverage link on PRs
#
# SECURITY NOTE: Actions are pinned to tags, not SHA commits.
# Before production release, pin all third-party actions to their SHA.
# Use: https://github.com/renovatebot/renovate or manual SHA lookup.
# Critical: aquasecurity/trivy-action, docker/* actions

name: PR Comment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  comment:
    name: Post PR Summary
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
            });
            if (pulls.data.length > 0) {
              return pulls.data[0].number;
            }
            return null;
          result-encoding: string

      - name: Download API image size artifact
        if: steps.pr.outputs.result != 'null'
        uses: actions/download-artifact@v4
        with:
          name: image-size-api
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: image-sizes
        continue-on-error: true

      - name: Download Web image size artifact
        if: steps.pr.outputs.result != 'null'
        uses: actions/download-artifact@v4
        with:
          name: image-size-web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: image-sizes
        continue-on-error: true

      - name: Get CI job results
        if: steps.pr.outputs.result != 'null'
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const results = {};
            for (const job of jobs.data.jobs) {
              results[job.name] = job.conclusion || 'pending';
            }
            return results;

      - name: Read image sizes
        if: steps.pr.outputs.result != 'null'
        id: sizes
        run: |
          API_SIZE="N/A"
          WEB_SIZE="N/A"
          if [ -f image-sizes/api.json ]; then
            API_SIZE=$(jq -r '.size' image-sizes/api.json)
          fi
          if [ -f image-sizes/web.json ]; then
            WEB_SIZE=$(jq -r '.size' image-sizes/web.json)
          fi
          echo "api=$API_SIZE" >> "$GITHUB_OUTPUT"
          echo "web=$WEB_SIZE" >> "$GITHUB_OUTPUT"

      - name: Post comment
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v7
        env:
          API_SIZE: ${{ steps.sizes.outputs.api }}
          WEB_SIZE: ${{ steps.sizes.outputs.web }}
        with:
          script: |
            const prNumber = parseInt(${{ steps.pr.outputs.result }});
            const conclusion = '${{ github.event.workflow_run.conclusion }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const icon = conclusion === 'success' ? ':white_check_mark:' : ':x:';

            let body = `## ${icon} CI Results\n\n`;
            body += `**Status:** ${conclusion}\n`;
            body += `**Run:** [View details](${runUrl})\n\n`;

            body += `### Test Results\n`;
            body += `| Job | Status |\n`;
            body += `|-----|--------|\n`;

            const jobs = ${{ steps.ci.outputs.result || '{}' }};
            for (const [name, status] of Object.entries(jobs)) {
              const jobIcon = status === 'success' ? ':white_check_mark:' : status === 'failure' ? ':x:' : ':hourglass:';
              body += `| ${name} | ${jobIcon} ${status} |\n`;
            }

            body += `\n### Docker Image Sizes\n`;
            body += `| Image | Size |\n`;
            body += `|-------|------|\n`;
            body += `| \`phantomrelay-saas-api\` | ${process.env.API_SIZE} |\n`;
            body += `| \`phantomrelay-saas-web\` | ${process.env.WEB_SIZE} |\n`;
            body += `\n> Trivy scan results available in [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning)\n`;

            body += `\n### Coverage\n`;
            body += `> Coverage report available as artifact in the [CI run](${runUrl})\n`;

            // Find existing bot comment to update
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
