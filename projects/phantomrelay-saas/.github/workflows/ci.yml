# PhantomRelay SaaS — CI/CD Pipeline
# Triggered on push to main and pull requests
#
# SECURITY NOTE: Actions are pinned to tags, not SHA commits.
# Before production release, pin all third-party actions to their SHA.
# Use: https://github.com/renovatebot/renovate or manual SHA lookup.
# Critical: aquasecurity/trivy-action, docker/* actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # -------------------------------------------------------
  # Lint + Typecheck (API tsc + Web astro check in parallel)
  # -------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API & Web (parallel)
        run: |
          pnpm --filter @phantomrelay-saas/api exec tsc --noEmit &
          PID_API=$!
          pnpm --filter @phantomrelay-saas/web exec astro check &
          PID_WEB=$!
          wait $PID_API || exit 1
          wait $PID_WEB || exit 1

  # -------------------------------------------------------
  # CodeQL SAST — TypeScript/JavaScript
  # -------------------------------------------------------
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # -------------------------------------------------------
  # Dependency audit
  # -------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

  # -------------------------------------------------------
  # Tests (needs lint to pass first)
  # -------------------------------------------------------
  test:
    name: Test
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: phantom
          POSTGRES_PASSWORD: phantom_dev
          POSTGRES_DB: phantomrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phantom -d phantomrelay"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://phantom:phantom_dev@localhost:5432/phantomrelay
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      ALLOWED_ORIGINS: http://localhost:4321

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @phantomrelay-saas/api prisma:generate

      - name: TypeScript typecheck
        run: pnpm --filter @phantomrelay-saas/api exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @phantomrelay-saas/api test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # -------------------------------------------------------
  # Docker build + Trivy scan + GHCR push (matrix: api + web)
  # -------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.app }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
        include:
          - app: api
            dockerfile: docker/Dockerfile.api
            image_name: phantomrelay-saas-api
          - app: web
            dockerfile: docker/Dockerfile.web
            image_name: phantomrelay-saas-web

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image_name }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image_name }}:ci
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

      - name: Get image size
        id: image-size
        run: |
          SIZE_BYTES=$(docker image inspect ${{ matrix.image_name }}:ci --format '{{.Size}}')
          SIZE_HUMAN=$(echo "$SIZE_BYTES" | numfmt --to=iec-i --suffix=B)
          echo "bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "human=$SIZE_HUMAN" >> "$GITHUB_OUTPUT"
          echo "### ${{ matrix.image_name }} image size: $SIZE_HUMAN" >> "$GITHUB_STEP_SUMMARY"

      - name: Save image size as artifact
        run: |
          mkdir -p image-sizes
          echo '{"app":"${{ matrix.app }}","image":"${{ matrix.image_name }}","size":"${{ steps.image-size.outputs.human }}","bytes":${{ steps.image-size.outputs.bytes }}}' \
            > image-sizes/${{ matrix.app }}.json

      - name: Upload image size artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-size-${{ matrix.app }}
          path: image-sizes/${{ matrix.app }}.json
          retention-days: 7

      - name: Push to GHCR (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
