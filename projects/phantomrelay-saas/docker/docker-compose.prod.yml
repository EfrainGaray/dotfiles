# PhantomRelay SaaS — Production stack
# Usage: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.production up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: phantomrelay-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: phantomrelay-redis-prod
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"

  api:
    image: ghcr.io/${GHCR_OWNER}/phantomrelay-api:${API_IMAGE_TAG:-latest}
    container_name: phantomrelay-api-prod
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/monitoring/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  web:
    image: ghcr.io/${GHCR_OWNER}/phantomrelay-web:${WEB_IMAGE_TAG:-latest}
    container_name: phantomrelay-web-prod
    ports:
      - "4321:4321"
    depends_on:
      - api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4321/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
