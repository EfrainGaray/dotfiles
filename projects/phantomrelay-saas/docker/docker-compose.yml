# PhantomRelay SaaS — Full development stack
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: phantomrelay-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: phantom_dev
      POSTGRES_DB: phantomrelay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom -d phantomrelay"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: phantomrelay-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: phantomrelay-api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://phantom:phantom_dev@postgres:5432/phantomrelay
      JWT_SECRET: dev-secret-change-in-production
      REDIS_URL: redis://redis:6379
      RELAY_API_URL: http://host.docker.internal:3000
      PORT: "3001"
    volumes:
      - ../apps/api/src:/app/apps/api/src
    command: pnpm --filter api dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: phantomrelay-web
    ports:
      - "4321:4321"
    depends_on:
      - api
    environment:
      PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ../apps/web/src:/app/apps/web/src
    command: pnpm --filter web dev --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4321/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
